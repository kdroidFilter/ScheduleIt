name: Android Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0). Defaults to 1.0.0 when not run from a tag."
        required: false
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build signed Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          # Encode versionCode as YYYYMMDDhhmm so each tag gets a monotonic value
          VERSION_CODE="${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.jks"
          stat "$RUNNER_TEMP/signing/release.jks"

      - name: Build APK + AAB (release)
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/signing/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
        run: |
          ./gradlew \
            :androidApp:assembleRelease \
            :androidApp:bundleRelease \
            -PappVersion=${{ steps.version.outputs.version }} \
            -PandroidVersionCode=${{ steps.version.outputs.versionCode }} \
            --no-daemon --stacktrace

      - name: Rename outputs with version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts
          shopt -s nullglob
          for apk in androidApp/build/outputs/apk/release/*.apk; do
            cp "$apk" "artifacts/ScheduleIt-${VERSION}.apk"
          done
          for aab in androidApp/build/outputs/bundle/release/*.aab; do
            cp "$aab" "artifacts/ScheduleIt-${VERSION}.aab"
          done
          ls -la artifacts/

      - name: Cleanup keystore
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/signing/release.jks" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: artifacts/*
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist yet, then attach the artifacts.
          # `--clobber` overwrites any existing assets with the same name so the
          # workflow stays idempotent on re-runs.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Android release $TAG"
          fi
          gh release upload "$TAG" artifacts/* --clobber
