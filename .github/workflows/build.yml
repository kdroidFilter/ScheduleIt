name: Build (GraalVM Native Image)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (x64)
            os: ubuntu-latest
            tasks: packageGraalvmDeb
            artifact: linux-x64
          - name: Linux (arm64)
            os: ubuntu-24.04-arm
            tasks: packageGraalvmDeb
            artifact: linux-arm64
          - name: Windows (x64)
            os: windows-latest
            tasks: packageGraalvmNsis packageGraalvmAppX
            artifact: windows-x64
          - name: macOS (arm64)
            os: macos-latest
            tasks: packageGraalvmDmg
            artifact: macos-arm64
          - name: macOS (x64)
            os: macos-13
            tasks: packageGraalvmDmg
            artifact: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Nucleus (GraalVM)
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          graalvm: "true"
          graalvm-java-version: "25"
          packaging-tools: "true"
          setup-gradle: "true"
          setup-node: "false"

      - name: Build native image
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_TASKS=""
          for task in ${{ matrix.tasks }}; do
            GRADLE_TASKS="$GRADLE_TASKS :desktopApp:$task"
          done
          ./gradlew $GRADLE_TASKS \
            -PappVersion=${{ steps.version.outputs.version }} \
            -PnativeMarch=compatibility \
            --no-daemon --stacktrace

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: scheduleit-${{ matrix.artifact }}
          path: |
            desktopApp/build/compose/binaries/**/*.deb
            desktopApp/build/compose/binaries/**/*.dmg
            desktopApp/build/compose/binaries/**/*.exe
            desktopApp/build/compose/binaries/**/*.msi
            desktopApp/build/compose/binaries/**/*.appx
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
