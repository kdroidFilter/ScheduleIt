name: Build (GraalVM Native Image + JBR/Leyden AppX/DMG)

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # GraalVM Native Image builds — Linux .deb, Windows .exe (NSIS).
  # GraalVM does not target Windows ARM64 → AppX/MSIX uses JBR/Leyden.
  # macOS GraalVM builds are flaky (codegen/toolchain issues) → macOS uses JBR/Leyden too.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (x64)
            os: ubuntu-latest
            tasks: packageGraalvmDeb
            release-name: Linux-x64
          - name: Linux (arm64)
            os: ubuntu-24.04-arm
            tasks: packageGraalvmDeb
            release-name: Linux-arm64
          - name: Windows (x64)
            os: windows-latest
            tasks: packageGraalvmNsis
            release-name: Windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Nucleus (GraalVM)
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          graalvm: "true"
          graalvm-java-version: "25"
          packaging-tools: "true"
          setup-gradle: "true"
          setup-node: "false"

      - name: Build native image
        shell: bash
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          GRADLE_TASKS=""
          for task in ${{ matrix.tasks }}; do
            GRADLE_TASKS="$GRADLE_TASKS :desktopApp:$task"
          done
          ./gradlew $GRADLE_TASKS \
            -PappVersion=${{ steps.version.outputs.version }} \
            -PnativeMarch=compatibility \
            --no-daemon --stacktrace

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.release-name }}
          path: |
            desktopApp/build/compose/binaries/**/*.deb
            desktopApp/build/compose/binaries/**/*.dmg
            desktopApp/build/compose/binaries/**/*.exe
            desktopApp/build/compose/binaries/**/*.msi
          if-no-files-found: error

  # macOS .dmg — JBR 25 + Project Leyden AOT cache (GraalVM is unreliable on macOS).
  # Runner labels per Nucleus CI guidance: macos-latest (arm64), macos-15-intel (amd64).
  build-mac:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            jbr-download-url: "https://github.com/kdroidFilter/JetBrainsRuntime/releases/download/v25.0.2b329.66-rtl/jdk-macos-aarch64.tar.gz"
          - os: macos-15-intel
            arch: amd64
            jbr-download-url: "https://github.com/kdroidFilter/JetBrainsRuntime/releases/download/v25.0.2b329.66-rtl/jdk-macos-x64.tar.gz"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Nucleus (JBR)
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          graalvm: "false"
          jbr-version: "25.0.2b329.66"
          jbr-download-url: ${{ matrix.jbr-download-url }}
          packaging-tools: "false"
          setup-gradle: "true"
          setup-node: "false"

      # DMG = initial install ; ZIP = silent auto-update payload (required by Nucleus updater).
      - name: Build DMG + ZIP (JVM + Leyden AOT cache + ProGuard)
        shell: bash
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
        run: |
          ./gradlew :desktopApp:packageReleaseDmg :desktopApp:packageReleaseZip \
            -PappVersion=${{ steps.version.outputs.version }} \
            -PenableAotCache=true \
            --no-daemon --stacktrace

      - name: Upload DMG + ZIP
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macOS-${{ matrix.arch }}
          path: |
            desktopApp/build/compose/binaries/**/*.dmg
            desktopApp/build/compose/binaries/**/*.zip
          if-no-files-found: error

  # AppX/MSIX builds — JBR 25 + Project Leyden AOT cache. Built on x64 and arm64
  # so a single .msixbundle covers both architectures for the Microsoft Store.
  build-appx:
    name: AppX (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Nucleus (JBR)
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          graalvm: "false"
          jbr-version: "25.0.2b329.66"
          packaging-tools: "false"
          setup-gradle: "true"
          setup-node: "false"

      - name: Build AppX (JVM + Leyden AOT cache + ProGuard)
        shell: bash
        env:
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
        run: |
          ./gradlew :desktopApp:packageReleaseAppX \
            -PappVersion=${{ steps.version.outputs.version }} \
            -PenableAotCache=true \
            --no-daemon --stacktrace

      - name: Upload AppX
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-Windows-appx-${{ matrix.arch }}
          path: desktopApp/build/compose/binaries/**/*.appx
          if-no-files-found: error

  bundle-windows:
    name: Windows MSIX Bundle
    needs: build-appx
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AppX (x64)
        uses: actions/download-artifact@v4
        with:
          name: release-assets-Windows-appx-x64
          path: artifacts/windows-x64

      - name: Download AppX (arm64)
        uses: actions/download-artifact@v4
        with:
          name: release-assets-Windows-appx-arm64
          path: artifacts/windows-arm64

      - name: Build MSIX bundle
        uses: kdroidFilter/Nucleus/.github/actions/build-windows-appxbundle@main
        with:
          amd64-path: artifacts/windows-x64
          arm64-path: artifacts/windows-arm64
          output-path: artifacts/windows-bundle

      - name: Upload MSIX bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-Windows-bundle
          path: artifacts/windows-bundle/**/*.msixbundle
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build, build-mac, build-appx, bundle-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-assets-*

      - name: Determine version and channel
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          case "$VERSION" in
            *-alpha*) echo "CHANNEL=alpha"  >> "$GITHUB_ENV"; echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV" ;;
            *-beta*)  echo "CHANNEL=beta"   >> "$GITHUB_ENV"; echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV" ;;
            *)        echo "CHANNEL=latest" >> "$GITHUB_ENV"; echo "RELEASE_TYPE=release"    >> "$GITHUB_ENV" ;;
          esac

      - name: Generate update YML files
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: artifacts
          version: ${{ env.VERSION }}
          channel: ${{ env.CHANNEL }}

      - name: Publish release
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        with:
          artifacts-path: artifacts
          tag: ${{ env.TAG }}
          release-type: ${{ env.RELEASE_TYPE }}
